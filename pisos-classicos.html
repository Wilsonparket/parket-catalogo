<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Parket - Clássicos</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: { headline: ["Inter"], body: ["Inter"], label: ["Inter"] }
        }
      }
    }
  </script>
  <style>
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* ── Navigation ── */
    .nav-blur {
      background: rgba(0,0,0,0.6);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }

    /* ── Carousel ── */
    .carousel-viewport {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 55vh;
      max-height: 560px;
      overflow: hidden;
      border-radius: 1.5rem;
      margin: 0 auto;
    }

    .carousel-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      transform: scale(1.04);
    }

    .carousel-slide.active {
      opacity: 1;
      transform: scale(1);
      z-index: 1;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      border-radius: 1.5rem;
    }

    /* ── Thumbnails ── */
    .thumb-strip {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding: 10px 0;
    }
    .thumb-strip::-webkit-scrollbar { display: none; }

    .thumb {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 0.75rem;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.3;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .thumb.active { opacity: 1; border-color: rgba(255,255,255,0.4); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ── UI ── */
    .progress-track {
      height: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 1px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: rgba(255,255,255,0.8);
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: all 0.4s ease;
    }
    .classic-viewport:hover .nav-arrow { opacity: 1; }
    .nav-arrow:hover { background: rgba(255,255,255,0.1); }
    .arrow-left { left: 30px; }
    .arrow-right { right: 30px; }

    .entry-ready {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .entry-ready.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body class="antialiased selection:bg-white selection:text-black">

  <!-- Navigation -->
  <nav class="fixed top-0 w-full z-50 nav-blur border-b border-white/5">
    <div class="flex justify-between items-center w-full px-12 py-6 max-w-screen-2xl mx-auto">
      <a href="pisos.html" class="flex items-center gap-4 group">
        <span class="material-symbols-outlined text-white/50 group-hover:text-white transition-all duration-300 transform group-hover:-translate-x-1">arrow_back</span>
        <span class="font-label text-[10px] uppercase tracking-[0.3em] text-white/50 group-hover:text-white transition-colors">Voltar aos Pisos</span>
      </a>
      <span class="font-label text-[10px] uppercase tracking-[0.3em] text-white/30">Clássicos</span>
    </div>
  </nav>

  <main class="pt-32 pb-40 px-12 max-w-screen-2xl mx-auto">

    <!-- Header -->
    <div class="entry-ready mb-20 max-w-3xl">
      <span class="font-label uppercase tracking-[0.6em] text-[10px] text-white/30 mb-8 block">Coleção Atemporal</span>
      <h1 class="text-[clamp(2.5rem,8vw,6.5rem)] font-extralight tracking-[-0.05em] leading-[0.85] mb-8 uppercase">Clássicos</h1>
      <p class="text-white/40 text-lg font-light leading-relaxed max-w-2xl">
        Padrões tradicionais reimaginados com a tecnologia contemporânea da Parket. Uma linha dedicada à sofisticação contínua que nunca sai de moda.
      </p>
    </div>

    <!-- Carousel -->
    <div class="entry-ready" style="transition-delay: 0.2s">
      <div class="carousel-viewport" id="classic-carousel">
        <button class="nav-arrow arrow-left" id="btn-left">
          <span class="material-symbols-outlined text-white text-2xl">chevron_left</span>
        </button>
        <button class="nav-arrow arrow-right" id="btn-right">
          <span class="material-symbols-outlined text-white text-2xl">chevron_right</span>
        </button>
      </div>

      <div class="max-w-[900px] mx-auto mt-12">
        <div class="flex items-center justify-between gap-12">

          <div class="progress-track flex-1">
            <div id="fill" class="progress-fill"></div>
          </div>
        </div>
        <div class="thumb-strip mt-12 justify-center" id="thumbs-track"></div>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="w-full py-24 px-12 bg-black border-t border-white/5">
    <div class="flex flex-col md:flex-row justify-between items-center gap-12 w-full max-w-screen-2xl mx-auto">
      <div class="text-xl font-bold tracking-widest text-white uppercase">PARKET</div>
      <div class="flex gap-12 opacity-30">
        <a href="#" class="text-[10px] uppercase tracking-[0.2em] hover:text-white transition-colors">Instagram</a>
        <a href="#" class="text-[10px] uppercase tracking-[0.2em] hover:text-white transition-colors">LinkedIn</a>
        <a href="#" class="text-[10px] uppercase tracking-[0.2em] hover:text-white transition-colors">Pinterest</a>
      </div>
      <div class="text-white/20 text-[10px] uppercase tracking-[0.2em] font-light">
        © 2024 PARKET INTERNAZIONALE. ALL RIGHTS RESERVED.
      </div>
    </div>
  </footer>

  <script>
    (function() {
      const images = [
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-01.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-02.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-03.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-04.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-05.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-06.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-07.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-08.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-09.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-10.jpg"
      ];

      let pos = 0;
      const carousel = document.getElementById('classic-carousel');
      const thumbs = document.getElementById('thumbs-track');
      const counter = document.getElementById('counter');
      const fill = document.getElementById('fill');

      function move(n) {
        if (n < 0) n = images.length - 1;
        if (n >= images.length) n = 0;
        pos = n;

        carousel.querySelectorAll('.classic-slide').forEach((s, i) => s.classList.toggle('active', i === pos));
        thumbs.querySelectorAll('.thumb').forEach((t, i) => {
          t.classList.toggle('active', i === pos);
          if (i === pos) t.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        });


        fill.style.width = `${((pos + 1) / images.length) * 100}%`;
      }

      function boot() {
        images.forEach((img, i) => {
          const s = document.createElement('div');
          s.className = 'carousel-slide' + (i === 0 ? ' active' : '');
          s.innerHTML = `<img src="${img}" alt="Clássico ${i+1}">`;
          s.addEventListener('click', () => move(pos + 1));
          carousel.insertBefore(s, document.getElementById('btn-left'));

          const t = document.createElement('div');
          t.className = 'thumb' + (i === 0 ? ' active' : '');
          t.innerHTML = `<img src="${img}" alt="Thumb ${i+1}">`;
          t.onclick = () => move(i);
          thumbs.appendChild(t);
        });

        document.getElementById('btn-right').onclick = () => move(pos + 1);
        document.getElementById('btn-left').onclick = () => move(pos - 1);
        
        fill.style.width = `${(1 / images.length) * 100}%`;

        document.querySelectorAll('.entry-ready').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), 200 + i * 200);
        });
        
        setInterval(() => move(pos + 1), 6000);
      }

      window.onload = boot;
    })();
  </script>
</body>
</html>
