<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://parket.com.br">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <title>Parket - Texturas</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="assets/js/components.js"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          borderRadius: { "DEFAULT": "0", "lg": "0", "xl": "0", "full": "9999px" },
          colors: { "surface": "#131313", "background": "#000000", "primary": "#ffffff" },
          fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] }
        }
      }
    }
  </script>
  <style>
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* ── Grid Card ── */
    .texture-card {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4 / 5;
      background: #111;
      cursor: pointer;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .texture-card:hover { transform: translateY(-4px); }

    .texture-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .texture-card:hover img { transform: scale(1.06); }

    .texture-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .texture-caption {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 10px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
      pointer-events: none;
    }
    .texture-name {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #fff;
      line-height: 1.3;
    }

    .card-download {
      position: absolute;
      top: 6px;
      right: 6px;
      z-index: 3;
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.9);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s ease, background 0.25s ease, transform 0.2s ease;
    }
    .card-download span {
      font-size: 16px;
      line-height: 1;
    }
    .card-download:hover {
      background: rgba(0,0,0,0.85);
      transform: scale(1.08);
      color: #fff;
    }
    .texture-card:hover .card-download {
      opacity: 1;
    }
    @media (hover: none) {
      .card-download { opacity: 1; }
    }

    /* ── Entry animation ── */
    .fade-up {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1);
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #lightbox.active { display: flex; opacity: 1; }
    #lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      transform: scale(0.95);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #lightbox.active #lightbox-img { transform: scale(1); }
    .lb-btn {
      position: absolute;
      z-index: 110;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: all 0.3s ease;
    }
    .lb-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.1); }
    .lb-close    { top: 40px; right: 40px; }
    .lb-download { top: 40px; left: 40px; }
    .lb-prev     { left: 40px; top: 50%; transform: translateY(-50%); }
    .lb-next     { right: 40px; top: 50%; transform: translateY(-50%); }

    #lightbox-caption {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 300;
    }
  </style>
  <parket-seo title="Parket Texturas"></parket-seo>
</head>
<body class="antialiased selection:bg-white selection:text-black">
  <parket-loader></parket-loader>
  <parket-nav return-url="catalogo.html#categories-section" return-text="Voltar ao Catálogo" category=""></parket-nav>

  <main class="px-6 md:px-12 pt-40 pb-40 max-w-screen-2xl mx-auto">
    <!-- Hero -->
    <div class="pb-16 fade-up">
      <span class="font-label uppercase tracking-[0.6em] text-[10px] text-white/30 mb-8 block">Padrões &amp; Desenhos</span>
      <h1 class="text-[clamp(3rem,8vw,8rem)] font-thin tracking-[-0.05em] leading-[0.85] mb-10">Texturas</h1>
      <p class="text-white/40 text-lg font-light leading-relaxed max-w-2xl">
        A linguagem visual da madeira. Cortes, recortes e combinações que elevam a superfície a uma assinatura autoral.
      </p>
    </div>

    <!-- Grid -->
    <div id="texturas-grid" class="grid grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-2 fade-up" style="transition-delay: 0.15s"></div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox">
    <button class="lb-btn lb-download" onclick="lbDownload()" title="Baixar textura"><span class="material-symbols-outlined">download</span></button>
    <button class="lb-btn lb-close" onclick="closeLightbox()"><span class="material-symbols-outlined">close</span></button>
    <button class="lb-btn lb-prev" onclick="lbPrev()"><span class="material-symbols-outlined">chevron_left</span></button>
    <img decoding="async" id="lightbox-img" src="" alt="Zoom">
    <button class="lb-btn lb-next" onclick="lbNext()"><span class="material-symbols-outlined">chevron_right</span></button>
    <div id="lightbox-caption"></div>
  </div>

  <script>
    (function () {
      const TEXTURES = [
        { name: 'ChevronNaturalle',            src: 'texturas/autoload/chevron-naturalle.webp' },
        { name: 'Espinha de peixe Mont Blanc', src: 'texturas/autoload/espinha-de-peixe-mont-blanc.webp' },
        { name: 'Mont Blanc',                  src: 'texturas/autoload/mont-blanc.webp' },
        { name: 'Piso Carvalho',               src: 'texturas/autoload/piso-carvalho.webp' },
        { name: 'Piso Verssailes',             src: 'texturas/autoload/piso-verssailes.webp' },
      ];

      function downloadTexture(i) {
        const tex = TEXTURES[i];
        const a = document.createElement('a');
        a.href = tex.src;
        a.download = `${tex.name.replace(/\s+/g, '-')}.webp`;
        document.body.appendChild(a);
        a.click();
        a.remove();
      }

      const grid = document.getElementById('texturas-grid');

      TEXTURES.forEach((tex, i) => {
        const card = document.createElement('div');
        card.className = 'texture-card';
        card.innerHTML = `
          <img src="${tex.src}" alt="${tex.name}" loading="${i < 4 ? 'eager' : 'lazy'}" decoding="async" fetchpriority="${i < 2 ? 'high' : 'auto'}">
          <button class="card-download" title="Baixar ${tex.name}" aria-label="Baixar ${tex.name}">
            <span class="material-symbols-outlined">download</span>
          </button>
          <div class="texture-caption">
            <div class="texture-name">${tex.name}</div>
          </div>
        `;
        card.querySelector('.card-download').addEventListener('click', (e) => {
          e.stopPropagation();
          downloadTexture(i);
        });
        card.addEventListener('click', () => openLightbox(i));
        grid.appendChild(card);
      });

      // Lightbox
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightbox-img');
      const lbCaption = document.getElementById('lightbox-caption');
      let current = 0;

      function updateLb() {
        lbImg.src = TEXTURES[current].src;
        lbCaption.textContent = TEXTURES[current].name;
      }

      window.openLightbox = function (idx) {
        current = idx;
        updateLb();
        lb.classList.add('active');
        document.body.style.overflow = 'hidden';
      };

      window.closeLightbox = function () {
        lb.classList.remove('active');
        document.body.style.overflow = 'auto';
      };

      window.lbNext = function () { current = (current + 1) % TEXTURES.length; updateLb(); };
      window.lbPrev = function () { current = (current - 1 + TEXTURES.length) % TEXTURES.length; updateLb(); };

      window.lbDownload = function () { downloadTexture(current); };

      document.addEventListener('keydown', (e) => {
        if (!lb.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowRight') lbNext();
        if (e.key === 'ArrowLeft') lbPrev();
        if (e.key === 'd' || e.key === 'D') lbDownload();
      });

      // Fade imediato — não espera o evento load
      document.querySelectorAll('.fade-up').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 50 + i * 100);
      });
    })();
  </script>
</body>
</html>
