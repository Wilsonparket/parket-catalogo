<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://parket.com.br">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <title>Parket - Texturas</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="assets/js/components.js"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          borderRadius: { "DEFAULT": "0", "lg": "0", "xl": "0", "full": "9999px" },
          colors: { "surface": "#131313", "background": "#000000", "primary": "#ffffff" },
          fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] }
        }
      }
    }
  </script>
  <style>
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

    .cat-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }
    @media (min-width: 768px) {
      .cat-grid { grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    }

    .cat-card {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4 / 5;
      background: #111;
      cursor: pointer;
      display: block;
      text-decoration: none;
      color: inherit;
      max-width: 60%;
      margin: 0;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @media (min-width: 768px) {
      .cat-card { aspect-ratio: 16 / 11; }
    }
    .cat-card:hover { transform: translateY(-4px); }

    .cat-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .cat-card:hover img { transform: scale(1.05); }

    .cat-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.25) 55%, rgba(0,0,0,0) 100%);
      pointer-events: none;
    }

    .cat-card-content {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      z-index: 2;
      padding: 1.75rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
    }
    @media (min-width: 768px) {
      .cat-card-content { padding: 2.25rem 2rem; }
    }
    .cat-card-title {
      font-weight: 200;
      letter-spacing: -0.03em;
      line-height: 0.95;
      font-size: clamp(1.4rem, 3.5vw, 2.625rem);
    }
    .cat-card-arrow {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
    }
    .cat-card:hover .cat-card-arrow {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.6);
      transform: translateX(4px);
    }
    .cat-card-arrow .material-symbols-outlined { font-size: 22px; line-height: 1; }

    .cat-card-soon {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 2;
      padding: 6px 12px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }

    .fade-up {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1);
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
  </style>
  <parket-seo title="Parket Texturas"></parket-seo>
</head>
<body class="antialiased selection:bg-white selection:text-black">
  <parket-loader></parket-loader>
  <parket-nav return-url="catalogo.html#categories-section" return-text="Voltar ao Catálogo" category=""></parket-nav>

  <main class="px-6 md:px-12 pt-40 pb-32 max-w-screen-2xl mx-auto">
    <div class="pb-16 fade-up">
      <h1 class="text-[clamp(3rem,8vw,8rem)] font-thin tracking-[-0.05em] leading-[0.85] mb-10">Texturas</h1>
      <p class="text-white/40 text-lg font-light leading-relaxed max-w-2xl">
        A linguagem visual da madeira. Escolha uma categoria para baixar texturas em alta resolução.
      </p>
    </div>

    <div id="cat-grid" class="cat-grid fade-up" style="transition-delay: 0.15s"></div>
  </main>

  <script>
    (function () {
      const CATEGORIES = [
        { slug: 'pisos', title: 'Pisos', image: 'pisos/image.webp', available: true },
      ];

      const grid = document.getElementById('cat-grid');

      CATEGORIES.forEach(cat => {
        const a = document.createElement('a');
        a.className = 'cat-card';
        a.href = `texturas-${cat.slug}.html`;
        a.innerHTML = `
          <img src="${cat.image}" alt="${cat.title}" loading="lazy" decoding="async">
          ${cat.available ? '' : '<span class="cat-card-soon">Em breve</span>'}
          <div class="cat-card-content">
            <h2 class="cat-card-title">${cat.title}</h2>
          </div>
        `;
        grid.appendChild(a);
      });

      document.querySelectorAll('.fade-up').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 50 + i * 100);
      });
    })();
  </script>
</body>
</html>
