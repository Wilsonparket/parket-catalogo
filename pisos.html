<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Parket - Pisos</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="assets/js/components.js"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          borderRadius: { "DEFAULT": "0", "lg": "0", "xl": "0", "full": "9999px" },
          colors: { "surface": "#131313", "background": "#000000", "primary": "#ffffff" },
          fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] }
        },
      },
    }
  </script>
  <style>
    :root {
      --scroll-progress: 0;
    }
    body { background-color: #000000; color: #FFFFFF; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    
    /* ── Immersive Hero ── */
    #hero-viewport {
      height: 120vh;
      position: relative;
    }
    #hero-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transform: scale(calc(1 + var(--scroll-progress) * 0.5));
      filter: brightness(0.3);
      will-change: transform;
    }
    #hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      opacity: calc(1 - var(--scroll-progress) * 2.5);
    }

    /* ── Zoom Cards ── */
    .zoom-card {
      opacity: 0;
      transform: scale(0.9) translateY(40px);
      transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .zoom-card.in-view {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    .category-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: #0a0a0a;
    }
    .category-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.5;
      transition: opacity 0.8s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .category-card:hover img { opacity: 0.8; transform: scale(1.1); }
    
    .card-label {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .category-card:hover .card-label { opacity: 1; }
    
    .static-label {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      z-index: 5;
      transition: opacity 0.4s ease;
    }
    .category-card:hover .static-label { opacity: 0; }
  </style>
  <parket-seo title="Parket Pisos"></parket-seo>
</head>
<body class="antialiased selection:bg-white selection:text-black">
  <parket-loader></parket-loader>
  <parket-nav return-url="catalogo.html" return-text="Voltar ao Catálogo" category="Pisos"></parket-nav>

  <!-- Immersive Sub-Hero -->
  <section id="hero-viewport">
    <div id="hero-sticky">
      <div id="hero-bg" style="background-image: url('https://parket.com.br/wp-content/uploads/2026/03/4D5A0231-b-1-scaled.jpg');"></div>
      <div id="hero-content" class="px-12">
        <span class="font-label uppercase tracking-[0.6em] text-[10px] text-white/30 mb-8 block">Coleção Engineered</span>
        <h1 class="text-[clamp(3rem,8vw,8rem)] font-thin tracking-[-0.05em] leading-[0.8] mb-12">Pisos</h1>
        <p class="max-w-xl mx-auto text-white/40 font-light text-lg tracking-wide uppercase">O alicerce da sofisticação arquitetônica</p>
      </div>
    </div>
  </section>

  <main class="relative z-20 bg-black">
    <!-- Grid -->
    <section class="pb-60">
      <div class="px-12 py-24 max-w-screen-2xl mx-auto flex items-center gap-8">
        <h2 class="text-[10px] uppercase tracking-[0.5em] text-white/30 shrink-0">Coleções Atemporais</h2>
        <div class="h-px flex-1 bg-white/10"></div>
      </div>
      <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-1"></div>
    </section>
  </main>

  <script>
    (function () {
      const EXTS = ['jpg', 'jpeg', 'png', 'webp'];
      const CATEGORIES = [
        { title: 'Brazil',         folder: 'brazil' },
        { title: 'Eternos',        folder: 'eternos' },
        { title: 'Únicos',         folder: 'unicos' },
        { title: 'Carvalhos',      folder: 'carvalhos',        cover: 'https://parket.com.br/wp-content/uploads/2026/03/4D5A0231-b-1-scaled.jpg' },
        { title: 'Grandiosos',     folder: 'grandiosos',       cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_GR-01.jpg' },
        { title: 'Pinho de Riga',  folder: 'pinho-de-riga',    cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_PR-07.jpg' },
        { title: 'Clássicos',      folder: 'classicos',        cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-01.jpg' },
        { title: 'Wood + Mármore', folder: 'listone-giordano', cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_MA-04.jpg' },
      ];

      async function findImage(cat) {
        if (cat.cover) return cat.cover;
        for (const ext of EXTS) {
          const src = `pisos/${cat.folder}/image.${ext}`;
          try {
            const res = await fetch(src, { method: 'HEAD' });
            if (res.ok) return src;
          } catch (e) {}
        }
        return null;
      }

      function createCard(cat, src) {
        const div = document.createElement('div');
        div.className = 'zoom-card';
        div.innerHTML = `
          <a href="pisos-${cat.folder}.html" class="category-card block aspect-[3/4]">
            <img src="${src || ''}" alt="${cat.title}">
            <div class="static-label">
              <h3 class="text-xl font-light tracking-widest uppercase text-white">${cat.title}</h3>
            </div>
            <div class="card-label">
              <h3 class="text-3xl font-thin tracking-tighter text-white mb-4">${cat.title}</h3>
              <div class="w-12 h-[1px] bg-white/40"></div>
              <span class="mt-8 font-label text-[9px] uppercase tracking-[0.4em] opacity-40">Explorar</span>
            </div>
          </a>`;
        return div;
      }

      async function init() {
        const grid = document.getElementById('category-grid');
        for (const cat of CATEGORIES) {
          const src = await findImage(cat);
          grid.appendChild(createCard(cat, src));
        }

        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('in-view');
          });
        }, { threshold: 0.1 });

        document.querySelectorAll('.zoom-card').forEach(c => observer.observe(c));
      }

      window.addEventListener('scroll', () => {
        const p = Math.min(window.scrollY / window.innerHeight, 1);
        document.documentElement.style.setProperty('--scroll-progress', p);
      }, { passive: true });

      window.addEventListener('load', init);
    })();
  </script>
</body>
</html>
);
  </script>
</body>
</html>
