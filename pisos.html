<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Parket - Pisos</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface": "#131313",
            "background": "#000000",
            "primary": "#ffffff"
          },
          "fontFamily": {
            "headline": ["Inter"],
            "body": ["Inter"]
          }
        },
      },
    }
  </script>
  <style>
    body { background-color: #000000; color: #FFFFFF; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .liquid-glass {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.02) 100%);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }
    .text-glow { text-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
    
    /* ── Floating Letters Style ── */
    .Pisos-letter {
      display: inline-block;
      will-change: transform, opacity;
    }
    
    /* ── Custom Navigation Blur ── */
    .nav-blur {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }

    /* ── Horizontal Scroll Utilities ── */
    .panel {
      width: 100vw;
      height: 100vh;
      flex-shrink: 0;
    }
    
    .horizontal-track {
      display: flex;
      width: 200vw;
      height: 100vh;
      will-change: transform;
    }

    /* ── Category Cards ── */
    .category-card {
      position: relative;
      overflow: hidden;
      border-radius: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.5s ease;
    }
    .category-card:hover {
      transform: scale(1.03);
      border-color: rgba(255,255,255,0.15);
    }
    .category-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%);
      pointer-events: none;
    }
    .category-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 80%;
      opacity: 0.6;
      transition: opacity 0.5s ease, transform 0.7s ease;
    }
    .category-card:hover img {
      opacity: 0.85;
      transform: scale(1.08);
    }
    .category-card .card-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 1.5rem;
    }

    .scroll-wrapper {
      height: 200vh; /* 2 panels */
    }

    .sticky-container {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body class="antialiased selection:bg-white selection:text-black">
  <parket-loader></parket-loader>

  <!-- Top Navigation (Always Fixed) -->
  <parket-nav return-url="catalogo.html" return-text="Voltar ao Catálogo" category=""></parket-nav>

  <main class="scroll-wrapper">
    <div class="sticky-container">
      <div id="horizontal-track" class="horizontal-track">
        
        <!-- Slide 1: Hero -->
        <section class="panel flex items-center justify-center px-12 pt-12 text-center">
          <div class="max-w-3xl mx-auto">
            <span class="font-label uppercase tracking-[0.5em] text-[10px] text-white/40 mb-8 block">Coleção Engineered</span>
            <h1 id="Pisos-title" class="text-[clamp(2rem,8vw,7.5rem)] font-extralight tracking-[-0.04em] leading-[0.85] mb-16" style="text-transform: none; font-family: 'Inter', sans-serif;">
              Pisos
            </h1>
            <p class="text-white/60 font-body text-xl leading-relaxed mx-auto mb-12 max-w-xl">
              O alicerce da sofisticação arquitetônica. Nossos pisos em madeira nobre redefinem a excelência através da textura, durabilidade e engenharia de precisão.
            </p>
            <div class="flex flex-col items-center gap-6">
              <div class="h-[1px] w-20 bg-white/20"></div>
              <p class="text-white/40 text-sm italic font-light">Elegância que se sente sob cada passo.</p>
            </div>
          </div>
        </section>

        <!-- Slide 2: Category Cards (autoload) -->
        <section class="panel flex items-center px-12">
          <div class="w-full max-w-screen-2xl mx-auto">
            <h2 class="text-[10px] uppercase tracking-[0.5em] text-white/30 mb-10">Coleções</h2>
            <div id="category-grid" class="grid grid-cols-3 grid-rows-3 gap-4 h-[78vh]"></div>
          </div>
        </section>



      </div>
    </div>
  </main>



  <script>
    // ── Autoload Category Cards ──
    // Para adicionar/remover uma coleção: edite CATEGORIES abaixo e crie/remova
    // a pasta correspondente em pisos/ com um image.jpg (ou .png/.webp) dentro.
    (function () {
      const EXTS = ['jpg', 'jpeg', 'png', 'webp'];
      const CATEGORIES = [
        { title: 'Brazil',           folder: 'brazil',           size: 'large' },
        { title: 'Eternos',          folder: 'eternos',          size: 'normal' },
        { title: 'Únicos',           folder: 'unicos',           size: 'normal' },
        { title: 'Carvalhos',        folder: 'carvalhos',        size: 'normal', cover: 'https://parket.com.br/wp-content/uploads/2026/03/4D5A0231-b-1-scaled.jpg' },
        { title: 'Grandiosos',       folder: 'grandiosos',       size: 'normal', cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_GR-01.jpg' },
        { title: 'Pinho de Riga',    folder: 'pinho-de-riga',    size: 'large', cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_PR-07.jpg' },
        { title: 'Clássicos',        folder: 'classicos',        size: 'normal', cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_CL-01.jpg' },
        { title: 'Wood + Mármore',   folder: 'listone-giordano', size: 'normal', cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_MA-04.jpg' },
        { title: 'Foglie D\'oro',    folder: 'foglie-doro',      size: 'normal' },
      ];

      function probe(src) {
        return new Promise((res, rej) => {
          const img = new Image();
          img.onload = () => res(src);
          img.onerror = () => rej();
          img.src = src + '?v=' + Date.now();
        });
      }

      async function findImage(cat) {
        if (cat.cover) return cat.cover;
        for (const ext of EXTS) {
          try { return await probe(`pisos/${cat.folder}/image.${ext}`); } catch {}
        }
        return null;
      }

      function createCard(cat, src) {
        const a = document.createElement('a');
        a.href = `pisos-${cat.folder}.html`;
        a.className = 'category-card' + (cat.size === 'large' ? ' row-span-2' : '');
        const isLarge = cat.size === 'large';
        a.innerHTML = `
          <img src="${src}${src.includes('?') ? '' : '?v=' + Date.now()}" alt="${cat.title}">
          <div class="card-label">
            <h3 class="font-headline ${isLarge ? 'text-2xl' : 'text-lg'} font-light">${cat.title}</h3>
          </div>`;
        return a;
      }

      function createPlaceholder(cat) {
        const a = document.createElement('a');
        a.href = `pisos-${cat.folder}.html`;
        a.className = 'category-card' + (cat.size === 'large' ? ' row-span-2' : '');
        const isLarge = cat.size === 'large';
        a.innerHTML = `
          <div class="absolute inset-0 flex items-center justify-center">
            <span class="material-symbols-outlined text-white/10 text-5xl">image</span>
          </div>
          <div class="card-label">
            <h3 class="font-headline ${isLarge ? 'text-2xl' : 'text-lg'} font-light">${cat.title}</h3>
          </div>`;
        return a;
      }

      window.addEventListener('load', async () => {
        const grid = document.getElementById('category-grid');
        if (!grid) return;
        for (const cat of CATEGORIES) {
          const src = await findImage(cat);
          grid.appendChild(src ? createCard(cat, src) : createPlaceholder(cat));
        }
      });
    })();
  </script>

  <script>
    // ── Horizontal Scroll Logic ──
    const track = document.getElementById('horizontal-track');
    const wrapper = document.querySelector('.scroll-wrapper');
    const panels = document.querySelectorAll('.panel');

    // ── Letter Parallax Logic ──
    (function() {
      const titleEl = document.getElementById('Pisos-title');
      let letters = [];
      if (titleEl) {
        const text = titleEl.textContent.trim();
        titleEl.innerHTML = text.split('').map((ch, i) => 
          `<span class="Pisos-letter" data-i="${i}">${ch === ' ' ? '&nbsp;' : ch}</span>`
        ).join('');
        letters = titleEl.querySelectorAll('.Pisos-letter');
      }

      const speeds = [0.6, 0.25, 0.45, 0.35, 0.55];
      const driftsX = [-1, 0.5, 0, -0.3, 0.8];

      window.addEventListener('scroll', () => {
        const sy = window.scrollY;
        const vh = window.innerHeight;
        
        // Horizontal translation progress
        // Total scrollable height = scroll-wrapper height - viewport height
        const totalScrollable = wrapper.offsetHeight - vh;
        const scrollProgress = Math.max(0, Math.min(sy / totalScrollable, 1));
        
        // Translate track
        // We move it from 0 to -(totalWidth - viewportWidth)
        const trackWidth = track.scrollWidth;
        const translateX = -scrollProgress * (trackWidth - window.innerWidth);
        track.style.transform = `translateX(${translateX}px)`;

        // Title Parallax (Slide 1 specific)
        const progressHero = Math.min(sy / (vh * 0.7), 1);
        letters.forEach((letter, i) => {
          const s = speeds[i] ?? 0.4;
          const dx = driftsX[i] ?? 0;
          const dy = -(sy * s);
          const opacity = Math.max(0, 1 - progressHero * 1.5);
          letter.style.transform = `translate(${dx * sy * 0.04}px, ${dy}px)`;
          letter.style.opacity = opacity;
        });

      }, { passive: true });
    })();
  </script>
</body>
</html>
