<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://parket.com.br">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <title>Parket - Texturas / Pisos</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <script src="assets/js/components.js"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          borderRadius: { "DEFAULT": "0", "lg": "0", "xl": "0", "full": "9999px" },
          colors: { "surface": "#131313", "background": "#000000", "primary": "#ffffff" },
          fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] }
        }
      }
    }
  </script>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .collection-section {
      padding: 4rem 1.5rem 6rem;
      max-width: 90rem;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .collection-section {
        padding: 5rem 3rem 7rem;
      }
    }

    .collection-header {
      margin-bottom: 2.5rem;
    }

    .texture-row {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 0.5rem;
    }

    .texture-row::-webkit-scrollbar {
      height: 6px;
    }

    .texture-row::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
    }

    .texture-row::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.18);
    }

    .texture-frame {
      position: relative;
      overflow: hidden;
      background: #111;
      cursor: pointer;
      aspect-ratio: 4 / 5;
      flex: 0 0 220px;
      scroll-snap-align: start;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @media (min-width: 768px) {
      .texture-frame {
        flex: 0 0 260px;
      }
    }

    .texture-frame:hover {
      transform: translateY(-3px);
    }

    .texture-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .texture-frame:hover img {
      transform: scale(1.04);
    }

    .texture-caption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 1rem 0.875rem 0.875rem;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.4) 60%, rgba(0, 0, 0, 0) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .texture-name {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #fff;
      line-height: 1.3;
    }

    .fade-up {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1), transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
  <parket-seo title="Parket Texturas Pisos"></parket-seo>
</head>

<body class="antialiased selection:bg-white selection:text-black">
  <parket-loader></parket-loader>
  <parket-nav return-url="texturas.html" return-text="Voltar a Texturas" category=""></parket-nav>

  <main class="relative z-20 bg-black pt-32">
    <div class="px-6 md:px-12 pt-8 pb-16 max-w-screen-2xl mx-auto fade-up">
      <span class="font-label uppercase tracking-[0.6em] text-[10px] text-white/30 mb-8 block">Texturas</span>
      <h1 class="text-[clamp(3rem,8vw,8rem)] font-thin tracking-[-0.05em] leading-[0.85] mb-10">Pisos</h1>
      <p class="text-white/40 text-lg font-light leading-relaxed max-w-2xl">
        Quatro padrões autorais para o piso: a delicadeza da <span class="text-white/70">Espinha de Peixe</span>, a geometria do <span class="text-white/70">Verssailes</span>, o ritmo do <span class="text-white/70">Chevron</span> e a serenidade da <span class="text-white/70">Reta</span>. Cada desenho transforma a madeira em assinatura.
      </p>
    </div>

    <div id="texturas-container"></div>
  </main>

  <script>
      (function () {
        const TEXTURES = [
          { slug: 'espinha-de-peixe-mont-blanc', name: 'Espinha de Peixe', src: 'texturas/autoload/espinha-de-peixe-mont-blanc.webp' },
          { slug: 'piso-verssailes', name: 'Verssailes', src: 'texturas/autoload/piso-verssailes.webp' },
          { slug: 'chevron-naturalle', name: 'Chevron', src: 'texturas/autoload/chevron-naturalle.webp' },
          { slug: 'reta', name: 'Reta', src: 'texturas/autoload/reta.webp' },
        ];

        const container = document.getElementById('texturas-container');

        const section = document.createElement('section');
        section.className = 'collection-section';
        section.innerHTML = `
        <div class="collection-header fade-up">
          <h2 class="text-[clamp(2.25rem,5vw,5rem)] font-extralight tracking-[-0.04em] leading-[0.9]">Carvalhos</h2>
        </div>
        <div class="texture-row fade-up" style="transition-delay: 0.15s"></div>
      `;
        const row = section.querySelector('.texture-row');

        TEXTURES.forEach((tex, i) => {
          const frame = document.createElement('a');
          frame.className = 'texture-frame';
          frame.href = `texturas-pisos-${tex.slug}.html`;
          frame.innerHTML = `
          <img src="${tex.src}" alt="${tex.name}" loading="${i < 2 ? 'eager' : 'lazy'}" decoding="async" fetchpriority="${i < 1 ? 'high' : 'auto'}">
          <div class="texture-caption">
            <div class="texture-name">${tex.name}</div>
          </div>
        `;
          row.appendChild(frame);
        });

        container.appendChild(section);

        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('visible');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.15 });

        document.querySelectorAll('.fade-up').forEach(el => io.observe(el));
      })();
  </script>
</body>

</html>
