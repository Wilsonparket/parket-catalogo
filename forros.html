<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Parket - Forros</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: { headline: ["Inter"], body: ["Inter"], label: ["Inter"] }
        }
      }
    }
  </script>
  <style>
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* ── Navigation ── */
    .nav-blur {
      background: rgba(0,0,0,0.6);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }

    /* ── Carousel ── */
    .carousel-viewport {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 55vh;
      max-height: 560px;
      overflow: hidden;
      border-radius: 1.5rem;
      margin: 0 auto;
    }

    .carousel-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      transform: scale(1.04);
    }

    .carousel-slide.active {
      opacity: 1;
      transform: scale(1);
      z-index: 1;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      border-radius: 1.5rem;
    }

    /* ── Thumbnails ── */
    .thumb-track {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding: 4px 0;
    }
    .thumb-track::-webkit-scrollbar { display: none; }

    .thumb {
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      border-radius: 0.5rem;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.4;
      transition: opacity 0.4s ease, border-color 0.4s ease, transform 0.3s ease;
    }
    .thumb:hover { opacity: 0.7; transform: scale(1.08); }
    .thumb.active { opacity: 1; border-color: rgba(255,255,255,0.6); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Progress bar ── */
    .progress-bar {
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: rgba(255,255,255,0.6);
      transition: width 0.3s ease;
    }

    /* ── Arrow buttons ── */
    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.4s ease, background 0.3s ease;
    }
    .carousel-viewport:hover .carousel-arrow { opacity: 1; }
    .carousel-arrow:hover { background: rgba(255,255,255,0.15); }
    .carousel-arrow.left { left: 20px; }
    .carousel-arrow.right { right: 20px; }

    /* ── Entry animation ── */
    .fade-up {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #lightbox.active { display: flex; opacity: 1; }
    #lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border-radius: 0.5rem;
      transform: scale(0.95);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #lightbox.active #lightbox-img { transform: scale(1); }
    .lb-btn {
      position: absolute;
      z-index: 110;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      transition: all 0.3s ease;
    }
    .lb-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.1); }
    .lb-close { top: 40px; right: 40px; }
    .lb-prev { left: 40px; }
    .lb-next { right: 40px; }
  </style>
  <script src="assets/js/components.js"></script>
  <parket-seo title="Parket Forros"></parket-seo>
</head>
<body class="antialiased selection:bg-white selection:text-black">
  <parket-loader></parket-loader>

  <!-- Navigation -->
  <parket-nav return-url="catalogo.html" return-text="Voltar ao Catálogo" category=""></parket-nav>

  <main class="pt-32 pb-40 px-12 max-w-screen-2xl mx-auto">

    <!-- Title -->
    <div class="fade-up mb-16">
      <span class="font-label uppercase tracking-[0.5em] text-[10px] text-white/30 mb-6 block -ml-0">Soluções Aéreas</span>
      <h1 id="page-title" class="text-[clamp(2.5rem,6vw,7rem)] font-extralight tracking-[-0.04em] leading-[0.85] mb-8 uppercase -ml-[10px]">Forros</h1>
      <p class="text-white/40 text-lg font-light leading-relaxed max-w-2xl">
        A leveza da madeira em novas alturas. Nossos forros acústicos e decorativos trazem calor e sofisticação para o teto do seu projeto.
      </p>
    </div>

    <!-- Carousel -->
    <div class="fade-up" style="transition-delay: 0.15s">
      <div class="carousel-viewport" id="carousel">
        <!-- Slides generated by JS -->
        <button class="carousel-arrow left" id="arrow-left">
          <span class="material-symbols-outlined text-white text-xl">chevron_left</span>
        </button>
        <button class="carousel-arrow right" id="arrow-right">
          <span class="material-symbols-outlined text-white text-xl">chevron_right</span>
        </button>
      </div>

      <!-- Progress -->
      <div class="max-w-[900px] mx-auto">
        <div class="flex items-center gap-6 mt-6">
          <div class="progress-bar flex-1">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <!-- Thumbnails -->
        <div class="thumb-track mt-6 justify-center" id="thumb-track"></div>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <parket-footer></parket-footer>

  <!-- Lightbox Structure -->
  <div id="lightbox">
    <button class="lb-btn lb-close" onclick="closeLightbox()">
      <span class="material-symbols-outlined">close</span>
    </button>
    <button class="lb-btn lb-prev" onclick="lbPrev()">
      <span class="material-symbols-outlined">chevron_left</span>
    </button>
    <img id="lightbox-img" src="" alt="Zoom">
    <button class="lb-btn lb-next" onclick="lbNext()">
      <span class="material-symbols-outlined">chevron_right</span>
    </button>
  </div>

  <script>
    (function () {
      const images = [
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-01.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-02.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-03.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-04.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-05.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-06.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-07.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-08.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-09.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-10.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-12.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-13.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-14.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-15.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-16.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-17.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-19.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-20.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-21.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-22.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-23.jpg",
        "https://parket.com.br/wp-content/uploads/2025/10/PRO_FO-25.jpg"
      ];

      let current = 0;
      let autoplayTimer = null;

      const carousel = document.getElementById('carousel');
      const thumbTrack = document.getElementById('thumb-track');
      const progressFill = document.getElementById('progress-fill');
      const arrowLeft = document.getElementById('arrow-left');
      const arrowRight = document.getElementById('arrow-right');

      function goTo(idx) {
        if (idx < 0) idx = images.length - 1;
        if (idx >= images.length) idx = 0;
        current = idx;

        carousel.querySelectorAll('.carousel-slide').forEach((s, i) => s.classList.toggle('active', i === current));
        thumbTrack.querySelectorAll('.thumb').forEach((t, i) => {
          t.classList.toggle('active', i === current);
          if (i === current) t.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        });

        progressFill.style.width = `${((current + 1) / images.length) * 100}%`;
        resetAutoplay();
      }

      function next() { goTo(current + 1); }
      function prev() { goTo(current - 1); }

      function resetAutoplay() {
        clearInterval(autoplayTimer);
        autoplayTimer = setInterval(next, 5000);
      }

      // ── Lightbox Logic ──
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightbox-img');

      window.openLightbox = function(idx) {
        current = idx;
        updateLightbox();
        lb.classList.add('active');
        document.body.style.overflow = 'hidden';
      };

      window.closeLightbox = function() {
        lb.classList.remove('active');
        document.body.style.overflow = 'auto';
        goTo(current);
      };

      function updateLightbox() {
        lbImg.src = images[current];
      }

      window.lbNext = function() {
        current = (current + 1) % images.length;
        updateLightbox();
      };

      window.lbPrev = function() {
        current = (current - 1 + images.length) % images.length;
        updateLightbox();
      };

      document.addEventListener('keydown', (e) => {
        if (!lb.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowRight') lbNext();
        if (e.key === 'ArrowLeft') lbPrev();
      });

      function buildCarousel() {
        images.forEach((src, i) => {
          const slide = document.createElement('div');
          slide.className = 'carousel-slide' + (i === 0 ? ' active' : '');
          slide.innerHTML = `<img src="${src}" alt="Forros ${i + 1}">`;
          slide.addEventListener('click', () => openLightbox(i));
          carousel.insertBefore(slide, arrowLeft);

          const thumb = document.createElement('div');
          thumb.className = 'thumb' + (i === 0 ? ' active' : '');
          thumb.innerHTML = `<img src="${src}" alt="Thumb ${i + 1}">`;
          thumb.addEventListener('click', () => goTo(i));
          thumbTrack.appendChild(thumb);
        });

        progressFill.style.width = `${(1 / images.length) * 100}%`;
        arrowLeft.addEventListener('click', prev);
        arrowRight.addEventListener('click', next);

        document.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowLeft') prev();
          if (e.key === 'ArrowRight') next();
        });

        let touchStartX = 0;
        carousel.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
        carousel.addEventListener('touchend', (e) => {
          const diff = touchStartX - e.changedTouches[0].clientX;
          if (Math.abs(diff) > 50) diff > 0 ? next() : prev();
        }, { passive: true });

        resetAutoplay();
        carousel.addEventListener('mouseenter', () => clearInterval(autoplayTimer));
        carousel.addEventListener('mouseleave', resetAutoplay);
      }

      function animateEntry() {
        document.querySelectorAll('.fade-up').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), 100 + i * 150);
        });
      }

      window.addEventListener('load', () => {
        buildCarousel();
        animateEntry();
      });
    })();
  </script>
</body>
</html>
