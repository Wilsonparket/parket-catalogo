<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Parket - Decks</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          borderRadius: { "DEFAULT": "0", "lg": "0", "xl": "0", "full": "0" },
          colors: { "surface": "#131313", "background": "#000000", "primary": "#ffffff" },
          fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] }
        },
      },
    }
  </script>
  <style>
    body { background-color: #000000; color: #FFFFFF; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .nav-blur {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }
    .category-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: #0a0a0a;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .category-card:hover { transform: scale(1.02); }
    .category-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.55;
      transition: opacity 0.6s ease, transform 0.8s ease;
    }
    .category-card:hover img { opacity: 0.8; transform: scale(1.05); }
    .category-card .card-label {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      background: rgba(0,0,0,0.35);
    }
    .fade-up { opacity: 0; transform: translateY(20px); transition: all 0.9s ease-out; }

    /* ── Spotlight effect ── */
    .spotlight-card {
      --mx: 50%;
      --my: 50%;
    }
    .spotlight-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        400px circle at var(--mx) var(--my),
        rgba(255,255,255,0.10) 0%,
        rgba(255,255,255,0.04) 35%,
        transparent 70%
      );
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 20;
    }
    .spotlight-card:hover::after {
      opacity: 1;
    }
  </style>
  <script src="assets/js/components.js"></script>
  <parket-seo title="Parket Decks"></parket-seo>
</head>
<body class="antialiased selection:bg-white selection:text-black">
  <parket-loader></parket-loader>
  <parket-nav return-url="catalogo.html" return-text="Voltar ao Catálogo" category="Decks"></parket-nav>

  <main>
    <!-- Hero -->
    <section class="min-h-[80vh] flex items-center justify-center px-12 pt-40 pb-24 text-center">
      <div class="max-w-4xl mx-auto fade-up">
        <span class="font-label uppercase tracking-[0.6em] text-[10px] text-white/30 mb-8 block">Áreas Externas</span>
        <h1 class="text-[clamp(3rem,8vw,8rem)] font-thin tracking-[-0.05em] leading-[0.8] mb-16" style="font-family: 'Inter', sans-serif;">
          Decks
        </h1>
        <p class="text-white/40 text-xl font-light leading-relaxed mx-auto max-w-2xl">
          Resistência e beleza sob o céu. Nossos decks são projetados para suportar as intempéries mantendo a nobreza e o conforto térmico da madeira natural.
        </p>
      </div>
    </section>

    <!-- Grid 3 colunas sem borda -->
    <section class="pb-60">
      <div class="px-12 mb-12 max-w-screen-2xl mx-auto flex items-center gap-8">
        <h2 class="text-[10px] uppercase tracking-[0.5em] text-white/30 shrink-0">Horizonte Nobre</h2>
        <div class="h-px flex-1 bg-white/10"></div>
      </div>
      <div id="category-grid" class="grid grid-cols-1 md:grid-cols-3"></div>
    </section>
  </main>

  <parket-videos></parket-videos>

  <script>
    (function () {
      const EXTS = ['jpg', 'jpeg', 'png', 'webp'];
      const CATEGORIES = [
        { title: 'Brazil',   folder: 'brazil',   cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-11.jpg' },
        { title: 'Eurodeck', folder: 'eurodeck', cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_EU-01.jpg' },
        { title: 'Kebony',   folder: 'kebony',   cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-01.jpg' },
        { title: 'Únicos',   folder: 'unicos',   cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_UN-05.jpg' },
      ];

      function probe(src) {
        return new Promise((res, rej) => {
          const img = new Image();
          img.onload = () => res(src);
          img.onerror = () => rej();
          img.src = src + '?v=' + Date.now();
        });
      }

      async function findImage(cat) {
        if (cat.cover) return cat.cover;
        for (const ext of EXTS) {
          try { return await probe(`decks/${cat.folder}/image.${ext}`); } catch {}
        }
        return null;
      }

      function createCard(cat, src) {
        const a = document.createElement('a');
        a.href = `decks-${cat.folder}.html`;
        a.className = 'category-card spotlight-card aspect-[4/5]';
        a.innerHTML = `
          <div class="absolute inset-0 bg-black/40 z-[1]"></div>
          <img class="z-0" src="${src}" alt="${cat.title}">
          <div class="card-label z-10">
            <h3 class="font-headline text-2xl font-thin tracking-tighter text-white">${cat.title}</h3>
          </div>`;
        return a;
      }

      function createPlaceholder(cat) {
        const a = document.createElement('a');
        a.href = `decks-${cat.folder}.html`;
        a.className = 'category-card spotlight-card aspect-[4/5]';
        a.innerHTML = `
          <div class="absolute inset-0 flex items-center justify-center bg-white/5">
            <span class="material-symbols-outlined text-white/5 text-5xl">image</span>
          </div>
          <div class="card-label z-10">
            <h3 class="font-headline text-2xl font-thin tracking-tighter text-white">${cat.title}</h3>
          </div>`;
        return a;
      }

      window.addEventListener('load', async () => {
        const grid = document.getElementById('category-grid');
        if (!grid) return;
        for (const cat of CATEGORIES) {
          const src = await findImage(cat);
          grid.appendChild(src ? createCard(cat, src) : createPlaceholder(cat));
        }
        setTimeout(() => {
          const el = document.querySelector('.fade-up');
          if (el) { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; }
        }, 100);
      });
    })();
  </script>

  <script>
    // ── Spotlight mouse tracking ──
    document.querySelectorAll('.spotlight-card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1) + '%';
        const y = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1) + '%';
        card.style.setProperty('--mx', x);
        card.style.setProperty('--my', y);
      });
    });
  </script>
</body>
</html>
