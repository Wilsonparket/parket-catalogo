<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://parket.com.br">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <title>Parket - Decks</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="assets/js/components.js"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          borderRadius: { "DEFAULT": "0", "lg": "0", "xl": "0", "full": "9999px" },
          colors: { "surface": "#131313", "background": "#000000", "primary": "#ffffff" },
          fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] }
        },
      },
    }
  </script>
  <style>
    :root { --scroll-progress: 0; }
    body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* ── Collection Section ── */
    .deck-section { padding: 7rem 3rem; max-width: 90rem; margin: 0 auto; }
    .deck-header { margin-bottom: 3rem; }

    /* ── Carousel ── */
    .carousel-viewport {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 55vh;
      max-height: 560px;
      overflow: hidden;
      margin: 0 auto;
    }
    .carousel-slide {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), transform 0.8s cubic-bezier(0.4,0,0.2,1);
      transform: scale(1.04);
    }
    .carousel-slide.active { opacity: 1; transform: scale(1); z-index: 1; }
    .carousel-slide img {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #000;
      cursor: zoom-in;
    }

    /* ── Thumbnails ── */
    .thumb-track {
      display: flex; gap: 8px;
      overflow-x: auto; scroll-behavior: smooth;
      padding: 4px 0;
    }
    .thumb-track::-webkit-scrollbar { display: none; }
    .thumb {
      flex-shrink: 0;
      width: 72px; height: 72px;
      overflow: hidden;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      opacity: 0.4;
      transition: opacity 0.4s ease, border-color 0.4s ease, transform 0.3s ease;
    }
    .thumb:hover { opacity: 0.7; transform: scale(1.08); }
    .thumb.active { opacity: 1; border-color: rgba(255,255,255,0.7); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Progress bar ── */
    .progress-bar {
      height: 2px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: rgba(255,255,255,0.6);
      transition: width 0.3s ease;
    }

    /* ── Fade-up entry ── */
    .fade-up {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* ── Divider between sections ── */
    .section-divider {
      max-width: 90rem; margin: 0 auto;
      padding: 0 3rem;
    }
    .section-divider > div {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
    }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      display: none;
      align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #lightbox.active { display: flex; opacity: 1; }
    #lightbox-img {
      max-width: 90vw; max-height: 85vh;
      object-fit: contain;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      transform: scale(0.95);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    #lightbox.active #lightbox-img { transform: scale(1); }
    .lb-btn {
      position: absolute; z-index: 110;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff;
      transition: all 0.3s ease;
    }
    .lb-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.1); }
    .lb-close { top: 40px; right: 40px; }
    .lb-prev  { left: 40px; top: 50%; transform: translateY(-50%); }
    .lb-next  { right: 40px; top: 50%; transform: translateY(-50%); }
  </style>
  <parket-seo title="Parket Decks"></parket-seo>
</head>
<body class="antialiased selection:bg-white selection:text-black">
  <parket-loader></parket-loader>
  <parket-nav return-url="catalogo.html#categories-section" return-text="Voltar ao Catálogo" category="Decks"></parket-nav>

  <main>
    <!-- Hero -->
    <section class="min-h-[80vh] flex items-center justify-center px-12 pt-40 pb-24 text-center">
      <div class="max-w-4xl mx-auto fade-up">
        <span class="font-label uppercase tracking-[0.6em] text-[10px] text-white/30 mb-8 block">Áreas Externas</span>
        <h1 class="text-[clamp(3rem,8vw,8rem)] font-thin tracking-[-0.05em] leading-[0.8] mb-16" style="font-family: 'Inter', sans-serif;">
          Decks
        </h1>
        <p class="text-white/40 text-xl font-light leading-relaxed mx-auto max-w-2xl">
          Resistência e beleza sob o céu. Nossos decks são projetados para suportar as intempéries mantendo a nobreza e o conforto térmico da madeira natural.
        </p>
      </div>
    </section>

    <div id="collections" class="relative z-20 bg-black"></div>
  </main>

  <parket-videos></parket-videos>

  <!-- Lightbox -->
  <div id="lightbox">
    <button class="lb-btn lb-close" onclick="closeLightbox()"><span class="material-symbols-outlined">close</span></button>
    <button class="lb-btn lb-prev" onclick="lbPrev()"><span class="material-symbols-outlined">chevron_left</span></button>
    <img decoding="async" id="lightbox-img" src="" alt="Zoom">
    <button class="lb-btn lb-next" onclick="lbNext()"><span class="material-symbols-outlined">chevron_right</span></button>
  </div>

  <script>
    (function () {
      const COLLECTIONS = [
        {
          key: 'brazil',
          title: 'Brazil',
          desc: 'Nossa homenagem às raízes tropicais. A Coleção Brazil traz o calor e a beleza duradoura da madeira nativa brasileira para áreas externas.',
          images: [
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-11.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-10.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-09.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-06.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-05.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-04.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-03.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-01.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-08.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-07.jpg"
          ]
        },
        {
          key: 'eurodeck',
          title: 'Eurodeck',
          desc: 'Engenharia de precisão com peças longas e uniformes. Uma seleção premium que alia simetria impecável e refinamento absoluto para o seu deck.',
          images: [
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_EU-01.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_EU-02.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_EU-03.jpg"
          ]
        },
        {
          key: 'kebony',
          title: 'Kebony',
          desc: 'Tecnologia norueguesa de modificação que transforma madeiras sustentáveis em joias estéticas e duráveis. O Kebony ganha uma belíssima pátina prateada atemporal.',
          images: [
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-01.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-02.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-03.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-04.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-05.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-06.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-07.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-08.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-09.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-10.jpg"
          ]
        },
        {
          key: 'unicos',
          title: 'Únicos',
          desc: 'Projetos de decks que vão além do convencional. Peças de arte natural e padrões sob medida desenhados para áreas molhadas que respiram vanguarda e ousadia.',
          images: [
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_UN-05.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_UN-06.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_UN-03.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_UN-04.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_UN-01.jpg",
            "https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_UN-02.jpg"
          ]
        }
      ];

      // ── Lightbox (shared) ──
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightbox-img');
      let lbImages = [];
      let lbIndex = 0;

      window.openLightbox = (images, idx) => {
        lbImages = images; lbIndex = idx;
        lbImg.src = lbImages[lbIndex];
        lb.classList.add('active');
        document.body.style.overflow = 'hidden';
      };
      window.closeLightbox = () => {
        lb.classList.remove('active');
        document.body.style.overflow = 'auto';
      };
      window.lbNext = () => {
        lbIndex = (lbIndex + 1) % lbImages.length;
        lbImg.src = lbImages[lbIndex];
      };
      window.lbPrev = () => {
        lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length;
        lbImg.src = lbImages[lbIndex];
      };
      document.addEventListener('keydown', (e) => {
        if (!lb.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowRight') lbNext();
        if (e.key === 'ArrowLeft') lbPrev();
      });

      function buildSection(col) {
        const section = document.createElement('section');
        section.className = 'deck-section';
        section.id = col.key;
        section.innerHTML = `
          <div class="deck-header fade-up">
            <span class="font-label uppercase tracking-[0.5em] text-[10px] text-white/30 mb-6 block">Coleção</span>
            <h2 class="text-[clamp(2.5rem,6vw,7rem)] font-extralight tracking-[-0.04em] leading-[0.85] mb-8">${col.title}</h2>
            ${col.desc ? `<p class="text-white/40 text-lg font-light leading-relaxed max-w-2xl">${col.desc}</p>` : ''}
          </div>
          <div class="fade-up" style="transition-delay: 0.15s">
            <div class="carousel-viewport"></div>
            <div class="max-w-[900px] mx-auto">
              <div class="flex items-center gap-6 mt-6">
                <div class="progress-bar flex-1"><div class="progress-fill"></div></div>
              </div>
              <div class="thumb-track mt-6 justify-center"></div>
            </div>
          </div>
        `;
        initCarousel(section, col.images, col.title);
        return section;
      }

      function initCarousel(section, images, title) {
        const viewport = section.querySelector('.carousel-viewport');
        const thumbTrack = section.querySelector('.thumb-track');
        const progressFill = section.querySelector('.progress-fill');

        let current = 0;
        let timer = null;

        images.forEach((src, i) => {
          const slide = document.createElement('div');
          slide.className = 'carousel-slide' + (i === 0 ? ' active' : '');
          slide.innerHTML = `<img decoding="async" src="${src}" alt="${title} ${i + 1}" loading="lazy">`;
          slide.addEventListener('click', () => openLightbox(images, i));
          viewport.appendChild(slide);

          const thumb = document.createElement('div');
          thumb.className = 'thumb' + (i === 0 ? ' active' : '');
          thumb.innerHTML = `<img decoding="async" src="${src}" alt="Thumb ${i + 1}" loading="lazy">`;
          thumb.addEventListener('click', () => goTo(i));
          thumbTrack.appendChild(thumb);
        });

        function goTo(idx) {
          if (idx < 0) idx = images.length - 1;
          if (idx >= images.length) idx = 0;
          current = idx;
          viewport.querySelectorAll('.carousel-slide').forEach((s, i) => {
            s.classList.toggle('active', i === current);
          });
          thumbTrack.querySelectorAll('.thumb').forEach((t, i) => {
            t.classList.toggle('active', i === current);
            if (i === current) { const tr = thumbTrack.getBoundingClientRect(), rr = t.getBoundingClientRect(); thumbTrack.scrollTo({ left: thumbTrack.scrollLeft + (rr.left - tr.left) - thumbTrack.clientWidth / 2 + rr.width / 2, behavior: 'smooth' }); }
          });
          progressFill.style.width = `${((current + 1) / images.length) * 100}%`;
          restart();
        }
        const next = () => goTo(current + 1);
        const prev = () => goTo(current - 1);

        function start() { if (timer) return; timer = setInterval(next, 5500); }
        function stop()  { if (!timer) return; clearInterval(timer); timer = null; }
        function restart() { stop(); start(); }

        viewport.addEventListener('mouseenter', stop);
        viewport.addEventListener('mouseleave', start);

        let touchStartX = 0;
        viewport.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
        viewport.addEventListener('touchend', (e) => {
          const diff = touchStartX - e.changedTouches[0].clientX;
          if (Math.abs(diff) > 50) diff > 0 ? next() : prev();
        }, { passive: true });

        progressFill.style.width = `${(1 / images.length) * 100}%`;

        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => e.isIntersecting ? start() : stop());
        }, { threshold: 0.25 });
        io.observe(section);
      }

      function init() {
        const container = document.getElementById('collections');
        for (let i = 0; i < COLLECTIONS.length; i++) {
          const col = COLLECTIONS[i];
          if (!col.images || !col.images.length) continue;
          container.appendChild(buildSection(col));
          if (i < COLLECTIONS.length - 1) {
            const div = document.createElement('div');
            div.className = 'section-divider';
            div.innerHTML = '<div></div>';
            container.appendChild(div);
          }
        }

        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-up').forEach(el => io.observe(el));
      }

      window.addEventListener('load', init);
    })();
  </script>
</body>
</html>
