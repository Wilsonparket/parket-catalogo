<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Parket - Decks</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface": "#131313",
            "background": "#000000",
            "primary": "#ffffff"
          },
          "fontFamily": {
            "headline": ["Inter"],
            "body": ["Inter"]
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #000000;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .liquid-glass {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.02) 100%);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }

    .text-glow {
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Floating Letters Style ── */
    .Decks-letter {
      display: inline-block;
      will-change: transform, opacity;
    }

    /* ── Smooth Scrolling ── */
    html {
      scroll-behavior: smooth;
    }

    /* ── Custom Navigation Blur ── */
    .nav-blur {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }

    /* ── Horizontal Scroll Utilities ── */
    .panel {
      width: 100vw;
      height: 100vh;
      flex-shrink: 0;
    }
    
    .horizontal-track {
      display: flex;
      width: 200vw;
      height: 100vh;
      will-change: transform;
    }

    /* ── Category Cards ── */
    .category-card {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.5s ease;
    }
    .category-card:hover {
      transform: scale(1.03);
      border-color: rgba(255,255,255,0.15);
    }
    .category-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%);
      pointer-events: none;
    }
    .category-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 80%;
      opacity: 0.6;
      transition: opacity 0.5s ease, transform 0.7s ease;
    }
    .category-card:hover img {
      opacity: 0.85;
      transform: scale(1.08);
    }
    .category-card .card-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 1.5rem;
    }

    .scroll-wrapper {
      height: 200vh; /* 2 panels */
    }

    .sticky-container {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }
  </style>
  <script src="assets/js/components.js"></script>
  <parket-seo title="Parket Decks"></parket-seo>
</head>

<body class="antialiased selection:bg-white selection:text-black">
  <parket-loader></parket-loader>

  <!-- Top Navigation -->
  <parket-nav return-url="catalogo.html" return-text="Voltar ao Catálogo" category=""></parket-nav>

  <main class="scroll-wrapper">
    <div class="sticky-container">
      <div id="horizontal-track" class="horizontal-track">
        
        <!-- Slide 1: Hero -->
        <section class="panel flex items-center justify-center px-12 pt-12 text-center">
          <div class="max-w-3xl mx-auto">
            <span class="font-label uppercase tracking-[0.5em] text-[10px] text-white/40 mb-8 block">Áreas Externas</span>
            <h1 id="Decks-title" class="text-[clamp(2rem,8vw,7.5rem)] font-extralight tracking-[-0.04em] leading-[0.85] mb-16" style="text-transform: none; font-family: 'Inter', sans-serif;">
              Decks
            </h1>
            <p class="text-white/60 font-body text-xl leading-relaxed mx-auto mb-12 max-w-xl">
              Resistência e beleza sob o céu. Nossos decks são projetados para suportar as intempéries mantendo a nobreza e o conforto térmico da madeira natural.
            </p>
            <div class="flex flex-col items-center gap-6">
              <div class="h-[1px] w-20 bg-white/20"></div>
              <p class="text-white/40 text-sm italic font-light">Vida ao ar livre com alma e design.</p>
            </div>
          </div>
        </section>

        <!-- Slide 2: Category Cards (autoload) -->
        <section class="panel flex items-center px-12">
          <div class="w-full max-w-screen-2xl mx-auto">
            <h2 class="text-[10px] uppercase tracking-[0.5em] text-white/30 mb-10">Coleções Especiais</h2>
            <div id="category-grid" class="grid grid-cols-4 gap-8"></div>
          </div>
        </section>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <!-- Vídeos Section -->
  <parket-videos></parket-videos>

  <script>
    // ── Autoload Category Cards ──
    (function () {
      const EXTS = ['jpg', 'jpeg', 'png', 'webp'];
      const CATEGORIES = [
        { title: 'Brazil',   folder: 'brazil',   size: 'normal', cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_BR-11.jpg' },
        { title: 'Eurodeck', folder: 'eurodeck', size: 'normal', cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_EU-01.jpg' },
        { title: 'Kebony',   folder: 'kebony',   size: 'normal', cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_KE-01.jpg' },
        { title: 'Únicos',   folder: 'unicos',   size: 'normal', cover: 'https://parket.com.br/wp-content/uploads/2025/10/PRO_DE_UN-05.jpg' },
      ];

      function probe(src) {
        return new Promise((res, rej) => {
          const img = new Image();
          img.onload = () => res(src);
          img.onerror = () => rej();
          img.src = src + '?v=' + Date.now();
        });
      }

      async function findImage(cat) {
        if (cat.cover) return cat.cover;
        for (const ext of EXTS) {
          try { return await probe(`decks/${cat.folder}/image.${ext}`); } catch {}
        }
        return null;
      }

      function createCard(cat, src) {
        const a = document.createElement('a');
        a.href = `decks-${cat.folder}.html`;
        a.className = 'category-card'; // We are keeping them all vertical pillars in a 4x1 grid!
        a.innerHTML = `
          <img src="${src}${src.includes('?') ? '' : '?v=' + Date.now()}" alt="${cat.title}">
          <div class="card-label">
            <h3 class="font-headline text-2xl font-light">${cat.title}</h3>
          </div>`;
        return a;
      }

      function createPlaceholder(cat) {
        const a = document.createElement('a');
        a.href = `decks-${cat.folder}.html`;
        a.className = 'category-card';
        a.innerHTML = `
          <div class="absolute inset-0 flex items-center justify-center">
            <span class="material-symbols-outlined text-white/10 text-5xl">image</span>
          </div>
          <div class="card-label">
            <h3 class="font-headline text-2xl font-light">${cat.title}</h3>
          </div>`;
        return a;
      }

      window.addEventListener('load', async () => {
        const grid = document.getElementById('category-grid');
        if (!grid) return;
        for (const cat of CATEGORIES) {
          const src = await findImage(cat);
          grid.appendChild(src ? createCard(cat, src) : createPlaceholder(cat));
        }
      });
    })();
  </script>

  <script>
    // ── Horizontal Scroll Logic ──
    const track = document.getElementById('horizontal-track');
    const wrapper = document.querySelector('.scroll-wrapper');
    const panels = document.querySelectorAll('.panel');

    // ── Letter Parallax Logic ──
    (function() {
      const titleEl = document.getElementById('Decks-title');
      let letters = [];
      if (titleEl) {
        const text = titleEl.textContent.trim();
        titleEl.innerHTML = text.split('').map((ch, i) => 
          `<span class="Decks-letter" data-i="${i}">${ch === ' ' ? '&nbsp;' : ch}</span>`
        ).join('');
        letters = titleEl.querySelectorAll('.Decks-letter');
      }

      const speeds = [0.6, 0.25, 0.45, 0.35, 0.55];
      const driftsX = [-1, 0.5, 0, -0.3, 0.8];

      window.addEventListener('scroll', () => {
        const sy = window.scrollY;
        const vh = window.innerHeight;
        
        const totalScrollable = wrapper.offsetHeight - vh;
        const scrollProgress = Math.max(0, Math.min(sy / totalScrollable, 1));
        
        const trackWidth = track.scrollWidth;
        const translateX = -scrollProgress * (trackWidth - window.innerWidth);
        track.style.transform = `translateX(${translateX}px)`;

        const progressHero = Math.min(sy / (vh * 0.7), 1);
        letters.forEach((letter, i) => {
          const s = speeds[i] ?? 0.4;
          const dx = driftsX[i] ?? 0;
          const dy = -(sy * s);
          const opacity = Math.max(0, 1 - progressHero * 1.5);
          letter.style.transform = `translate(${0}px, ${dy}px)`;
          letter.style.opacity = opacity;
        });

      }, { passive: true });
    })();
  </script>
</body>

</html>
