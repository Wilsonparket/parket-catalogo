      tailwind.config = {

        theme: {
          extend: {

                    "outline": "#919191",

                    "on-secondary": "#1a1c1c",
                    "secondary-fixed-dim": "#aaabab",

<style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
        }
        .liquid-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .text-glow {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* ── Cinematic exit curtain ── */
        #exit-curtain {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.9s cubic-bezier(0.76, 0, 0.24, 1);
        }
        #exit-curtain.closing {
            opacity: 1;
        }

        /* ── Scroll Reveal ── */
        [data-reveal] {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        [data-reveal="left"]  { transform: translateX(-60px) translateY(0); }
        [data-reveal="right"] { transform: translateX(60px) translateY(0); }
        [data-reveal="scale"] { transform: scale(0.90); opacity: 0; }
        [data-reveal="line"]  {
            transform: none;
            opacity: 0;
            clip-path: inset(0 100% 0 0);
            transition: opacity 0.01s, clip-path 1.1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        [data-reveal].is-visible {
            opacity: 1;
            transform: none;
            clip-path: inset(0 0% 0 0);
        }
        [data-delay="1"] { transition-delay: 0.1s; }
        [data-delay="2"] { transition-delay: 0.2s; }
        [data-delay="3"] { transition-delay: 0.3s; }
        [data-delay="4"] { transition-delay: 0.45s; }
        [data-delay="5"] { transition-delay: 0.6s; }

        /* ── Parallax ── */
        .parallax-video { will-change: transform; }
        .hero-content   { will-change: transform, opacity; }

        /* ── Catalog button glass ── */
        .catalog-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.04) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 4px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .catalog-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.0) 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: inherit;
        }
        .catalog-btn:hover::before {
            opacity: 1;
        }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-black">
<div id="exit-curtain"></div>
<main>
<!-- Scroll container — 250vh dá espaço para o efeito acontecer -->
<div style="height: 250vh;">
    <section style="position: sticky; top: 0; height: 100vh; overflow: hidden;" class="w-full flex items-center justify-center">
        <video
            autoplay
            muted
            loop
            playsinline
            preload="auto"
            poster="autoload/video-home-poster.jpg"
            class="parallax-video absolute inset-0 w-full h-full object-cover opacity-80"
        >
            <source src="autoload/video-home.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="absolute inset-0 bg-black/30"></div>
        <!-- CTA Button -->
        <div id="btn-wrap" class="relative z-10 flex items-center justify-center">
            <button id="catalog-btn" onclick="goToCatalog()" style="transform-origin: center center;" class="catalog-btn group relative overflow-hidden px-10 py-4 rounded-full border border-white/25 text-white font-['Inter'] text-[13px] font-light tracking-[0.25em] uppercase active:scale-95">
                <span class="relative z-10">Acesse o nosso catálogo</span>
            </button>
        </div>
    </section>
</div>
</main>

<script>
(function () {
  const video   = document.querySelector('.parallax-video');
  const btn     = document.getElementById('catalog-btn');
  let   current = 1;
  let   target  = 1;
  let   rafId   = null;

  function lerp(a, b, t) { return a + (b - a) * t; }

  function animate() {
    current = lerp(current, target, 0.08);
    btn.style.transform = `scale(${current})`;
    if (Math.abs(current - target) > 0.001) {
      rafId = requestAnimationFrame(animate);
    } else {
      rafId = null;
    }
  }

  function onScroll() {
    const sy       = Math.max(0, window.scrollY);
    const progress = Math.min(sy / window.innerHeight, 1);
    target = 1 + progress * 0.65;
    if (!rafId) rafId = requestAnimationFrame(animate);
  }

  window.addEventListener('scroll', onScroll, { passive: true });
})();

function goToCatalog() {
  const curtain = document.getElementById('exit-curtain');
  const btn     = document.querySelector('.catalog-btn');
  const video   = document.querySelector('.parallax-video');

  // 1. Botão dissolve
  btn.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
  btn.style.opacity    = '0';
  btn.style.transform  = 'scale(0.94)';

  // 2. Vídeo zoom lento — sensação de "entrar" na cena
  video.style.transition = 'transform 1s cubic-bezier(0.76, 0, 0.24, 1)';
  video.style.transform  = 'scale(1.1)';

  // 3. Cortina fecha
  setTimeout(() => curtain.classList.add('closing'), 120);

  // 4. Navega
  setTimeout(() => { window.location.href = 'catalogo.html'; }, 1050);
}
</script>
</body></html>
